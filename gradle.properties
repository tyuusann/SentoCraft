# Sets default memory used for gradle commands. Can be overridden by user or command line properties.
org.gradle.jvmargs=-Xmx1G
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# Read more:
# https://github.com/neoforged/ModDevGradle
#
# ParchmentはMinecraft 1.21用マッピングを引き続き使用します。
# 1.21.1向けの開発でも利用可能です。
parchment_minecraft_version=1.21
parchment_mappings_version=2024.11.10

# Environment Properties

# Minecraft 1.21.1
minecraft_version=1.21.1

# SentoCraftをMinecraft 1.21.1専用にします。
minecraft_version_range=[1.21.1,1.21.2)

# Minecraft 1.21.1系列のNeoForgeです。
neo_version=21.1.233

# NeoForge loader version range
loader_version_range=[1,)

## Mod Properties

# The unique mod identifier for the mod.
mod_id=sentocraft

# The human-readable display name for the mod.
mod_name=Sento Craft

# The license of the mod.
mod_license=All Rights Reserved

# The mod version.
mod_version=1.0.0

# The group ID for the mod.
mod_group_id=dev.bluerotor.sentocraft